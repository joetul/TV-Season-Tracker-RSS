<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brooklyn Nine-Nine Season 1 Update</title>
    <style>
        :root {
            --bg: #0f1318;
            --surface: #1a232e;
            --text: #f2efe8;
            --muted: #bac2cb;
            --line: #314257;
            --accent: #f0c164;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 15%, rgba(240, 193, 100, 0.12), transparent 35%),
                radial-gradient(circle at 88% 8%, rgba(118, 200, 172, 0.11), transparent 32%),
                var(--bg);
            padding: 1.4rem;
        }
        .card {
            max-width: 760px;
            margin: 0 auto;
            background: linear-gradient(155deg, rgba(26, 35, 46, 0.95), rgba(16, 22, 29, 0.95));
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 1.2rem 1.2rem 1rem;
        }
        h1 { margin: 0 0 0.35rem; font-size: clamp(1.35rem, 3.5vw, 1.95rem); }
        .sub { margin: 0 0 1rem; color: var(--muted); }
        dl { margin: 0; display: grid; grid-template-columns: 120px 1fr; gap: 0.45rem 0.8rem; }
        dt { color: var(--muted); }
        dd { margin: 0; }
        .actions { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.55rem; }
        .btn {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0.42rem 0.75rem;
            color: var(--text);
            text-decoration: none;
            background: rgba(18, 24, 33, 0.72);
        }
        .btn.primary { border-color: rgba(240, 193, 100, 0.7); color: var(--accent); }
    </style>
</head>
<body>
    <article class="card">
        <h1>Brooklyn Nine-Nine Season 1</h1>
        <p class="sub">Season update from TV Season Tracker RSS</p>
        <dl>
            <dt>Premiere</dt><dd>2013-09-17</dd>
            <dt>Finale</dt><dd>2014-03-25</dd>
            <dt>Episodes</dt><dd>22</dd>
        </dl>
        <div class="actions">
            <a class="btn primary" href="https://joetul.github.io/TV-Season-Tracker-RSS/feeds/brooklyn-nine-nine.xml">Open RSS feed</a>
            <a class="btn" href="https://www.google.com/search?q=Brooklyn%20Nine-Nine%20where%20to%20watch">Where to watch</a>
            <a class="btn" href="https://www.tvmaze.com/seasons/148/brooklyn-nine-nine-season-1">TVmaze season page</a>
        </div>
    </article>
</body>
</html>
