<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV Season Tracker - RSS Feeds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #282a36;
      --bg-alt: #44475a;
      --bg-darker: #21222c;
      --fg: #f8f8f2;
      --fg-muted: #a0a4b8;
      --comment: #6272a4;
      --cyan: #8be9fd;
      --green: #50fa7b;
      --orange: #ffb86c;
      --pink: #ff79c6;
      --purple: #bd93f9;
      --red: #ff5555;
      --yellow: #f1fa8c;
      --border-radius: 6px;
      --transition: 0.15s ease;
      --max-width: 1100px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }

    /* ── Sticky Header ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-darker);
      border-bottom: 1px solid var(--bg-alt);
      padding: 0.75rem 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .header-brand {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .site-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--purple);
      line-height: 1;
    }

    .site-subtitle {
      font-size: 0.8rem;
      color: var(--comment);
    }

    .missing-show-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 1rem;
      background: rgba(255, 121, 198, 0.12);
      color: var(--pink);
      border: 1px solid rgba(255, 121, 198, 0.25);
      border-radius: var(--border-radius);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: var(--transition);
      white-space: nowrap;
    }

    .missing-show-link:hover {
      background: rgba(255, 121, 198, 0.22);
      border-color: var(--pink);
    }

    /* Search + Filter Row */
    .search-filter-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .search-box {
      flex: 1;
      position: relative;
      max-width: 400px;
    }

    .search-icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--comment);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.25rem;
      font-size: 0.9rem;
      font-family: inherit;
      border: 1px solid var(--comment);
      border-radius: var(--border-radius);
      background: var(--bg);
      color: var(--fg);
      outline: none;
      transition: var(--transition);
    }

    .search-box input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(189, 147, 249, 0.15);
    }

    .search-box input::placeholder { color: var(--comment); }

    /* Actions Row */
    .actions-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .stats {
      color: var(--fg-muted);
      font-size: 0.8rem;
      flex: 1;
    }

    .bulk-actions { display: flex; gap: 0.4rem; }

    .btn {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: none;
      border-radius: var(--border-radius);
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: var(--bg-alt);
      color: var(--fg);
      transition: var(--transition);
    }

    .btn:hover:not(:disabled) { background: var(--comment); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--pink); color: var(--bg); }
    .btn-primary:hover:not(:disabled) { background: #ff92d0; }

    /* ── Main Table ── */
    .main-content {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .shows-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .col-select  { width: 40px; }
    .col-image   { width: 52px; }
    .col-name    { width: auto; }
    .col-status  { width: 100px; }
    .col-actions { width: 120px; }

    .shows-table thead th {
      position: sticky;
      z-index: 10;
      background: var(--bg);
      padding: 0.6rem 0.5rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--comment);
      border-bottom: 2px solid var(--bg-alt);
      white-space: nowrap;
    }

    .shows-table thead th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .shows-table thead th.sortable:hover { color: var(--purple); }

    .shows-table thead th.sort-asc::after  { content: " \25B2"; font-size: 0.55rem; }
    .shows-table thead th.sort-desc::after { content: " \25BC"; font-size: 0.55rem; }

    .show-row {
      transition: background var(--transition);
      border-bottom: 1px solid rgba(68, 71, 90, 0.4);
    }

    .show-row:hover { background: rgba(68, 71, 90, 0.35); }

    .show-row td {
      padding: 0.4rem 0.5rem;
      vertical-align: middle;
      font-size: 0.9rem;
    }

    .show-thumb {
      width: 40px;
      height: 56px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      background: var(--bg-alt);
    }

    .show-name-text {
      font-weight: 600;
      color: var(--fg);
      line-height: 1.2;
    }

    .show-year {
      font-size: 0.75rem;
      color: var(--comment);
      margin-top: 1px;
    }

    .status-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-running { background: rgba(80, 250, 123, 0.15); color: var(--green); }
    .status-ended   { background: rgba(255, 85, 85, 0.15); color: var(--red); }
    .status-tbd     { background: rgba(255, 184, 108, 0.15); color: var(--orange); }

    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.3rem 0.55rem;
      border: 1px solid var(--comment);
      border-radius: 4px;
      background: transparent;
      color: var(--comment);
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      margin-right: 0.25rem;
    }

    .btn-rss:hover {
      border-color: var(--purple);
      color: var(--purple);
      background: rgba(189, 147, 249, 0.1);
    }

    .btn-rss.copied {
      border-color: var(--green);
      color: var(--green);
      background: rgba(80, 250, 123, 0.1);
    }

    .btn-link:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(139, 233, 253, 0.1);
    }

    .show-cb, #select-all-cb {
      width: 16px;
      height: 16px;
      accent-color: var(--purple);
      cursor: pointer;
    }

    .empty-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--comment);
      font-size: 1rem;
    }

    /* ── Footer ── */
    .site-footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.5rem;
      text-align: center;
      border-top: 1px solid var(--bg-alt);
      color: var(--comment);
      font-size: 0.8rem;
    }

    .site-footer a { color: var(--purple); text-decoration: none; }
    .site-footer a:hover { color: var(--pink); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .site-header { padding: 0.5rem 0.75rem; }

      .header-top { margin-bottom: 0.5rem; }
      .site-subtitle { display: none; }

      .missing-show-link { font-size: 0.75rem; padding: 0.35rem 0.7rem; }

      .search-filter-row { flex-direction: column; gap: 0.5rem; }
      .search-box { max-width: 100%; }

      .actions-row { gap: 0.5rem; }
      .stats { width: 100%; order: -1; }

      .main-content { padding: 0 0.5rem 2rem; }

      .col-status { display: none; }
      .show-mobile-meta { display: flex !important; }
      .col-image { width: 44px; }
      .col-actions { width: 90px; }
      .btn-action { padding: 0.25rem 0.4rem; font-size: 0.7rem; }
    }

    @media (min-width: 769px) {
      .show-mobile-meta { display: none !important; }
    }

    /* ── Kbd hint ── */
    .kbd-hint {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: var(--comment);
      background: var(--bg-alt);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      border: 1px solid var(--comment);
      pointer-events: none;
      opacity: 0.6;
      transition: opacity var(--transition);
    }

    .search-box input:focus ~ .kbd-hint { opacity: 0; }

    /* ── Loading skeleton ── */
    .loading-indicator {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--comment);
    }

    .loading-indicator .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--bg-alt);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-top">
        <div class="header-brand">
          <h1 class="site-title">TV Season Tracker</h1>
          <span class="site-subtitle">RSS feeds for every season</span>
        </div>
        <a href="https://github.com/joetul/TV-Season-Tracker-RSS/issues/new?labels=show-request&title=Request%3A+Add+[SHOW+NAME]"
           target="_blank" class="missing-show-link">+ Request a Show</a>
      </div>

      <div class="search-filter-row">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Search shows..." autofocus autocomplete="off">
          <span class="kbd-hint">/</span>
        </div>
      </div>

      <div class="actions-row">
        <div class="stats" id="stats">Loading...</div>
        <div class="bulk-actions">
          <button id="btn-select-all" class="btn">Select Visible</button>
          <button id="btn-clear" class="btn" disabled>Clear</button>
          <button id="btn-export" class="btn btn-primary" disabled>Export OPML</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <table class="shows-table" id="shows-table">
      <thead>
        <tr>
          <th class="col-select"><input type="checkbox" id="select-all-cb" title="Select all visible"></th>
          <th class="col-image"></th>
          <th class="col-name sortable" data-sort="name">Name</th>
          <th class="col-status sortable" data-sort="status">Status</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody id="shows-body"></tbody>
    </table>
    <div id="empty-msg" class="empty-msg" hidden>No shows found.</div>
    <div id="loading" class="loading-indicator">
      <div class="spinner"></div>
      <div>Loading shows...</div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Data from <a href="https://www.tvmaze.com/api" target="_blank">TVmaze</a> &middot;
       <a href="https://github.com/joetul/TV-Season-Tracker-RSS" target="_blank">GitHub</a> &middot;
       <a href="https://github.com/joetul/TV-Season-Tracker-RSS/issues/new?labels=show-request&title=Request%3A+Add+[SHOW+NAME]" target="_blank">Request a Show</a></p>
  </footer>

  <script>
    /* ── State ── */
    let allShows = [];
    let selectedShows = new Set();
    let currentFilter = { query: "" };
    let currentSort = { field: "name", direction: "asc" };

    /* ── DOM cache ── */
    const els = {
      search: document.getElementById("search"),
      showsTable: document.getElementById("shows-table"),
      showsBody: document.getElementById("shows-body"),
      emptyMsg: document.getElementById("empty-msg"),
      loading: document.getElementById("loading"),
      stats: document.getElementById("stats"),
      selectAllCb: document.getElementById("select-all-cb"),
      btnSelectAll: document.getElementById("btn-select-all"),
      btnClear: document.getElementById("btn-clear"),
      btnExport: document.getElementById("btn-export")
    };

    /* ── Init ── */
    function init() {
      fetch("./feeds/index.json", { cache: "no-store" })
        .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(data => {
          allShows = Array.isArray(data) ? data : [];
          els.loading.hidden = true;
          render();
          updateStickyOffset();
        })
        .catch(() => {
          els.loading.hidden = true;
          els.showsTable.hidden = true;
          els.emptyMsg.hidden = false;
          els.emptyMsg.textContent = "Feeds are loading or unavailable. Check back in a moment.";
          els.emptyMsg.style.color = "var(--red)";
          els.stats.textContent = "Error";
        });

      els.search.addEventListener("input", () => {
        currentFilter.query = els.search.value.trim().toLowerCase();
        render();
      });

      document.querySelectorAll(".sortable").forEach(th => {
        th.addEventListener("click", () => {
          const field = th.dataset.sort;
          if (currentSort.field === field) {
            currentSort.direction = currentSort.direction === "asc" ? "desc" : "asc";
          } else {
            currentSort.field = field;
            currentSort.direction = "asc";
          }
          updateSortIndicators();
          render();
        });
      });

      els.selectAllCb.addEventListener("change", () => {
        const filtered = getFilteredShows();
        if (els.selectAllCb.checked) {
          filtered.forEach(s => selectedShows.add(getShowKey(s)));
        } else {
          filtered.forEach(s => selectedShows.delete(getShowKey(s)));
        }
        updateBulkUI();
        updateCheckboxes();
      });

      els.btnSelectAll.addEventListener("click", () => {
        getFilteredShows().forEach(s => selectedShows.add(getShowKey(s)));
        updateBulkUI();
        updateCheckboxes();
        updateSelectAllCb();
      });

      els.btnClear.addEventListener("click", () => {
        selectedShows.clear();
        updateBulkUI();
        updateCheckboxes();
        updateSelectAllCb();
      });

      els.btnExport.addEventListener("click", exportOPML);

      // Event delegation on table body
      els.showsBody.addEventListener("change", e => {
        if (e.target.classList.contains("show-cb")) {
          if (e.target.checked) selectedShows.add(e.target.value);
          else selectedShows.delete(e.target.value);
          updateBulkUI();
          updateSelectAllCb();
        }
      });

      els.showsBody.addEventListener("click", e => {
        const rssBtn = e.target.closest(".btn-rss");
        if (rssBtn) copyRSS(rssBtn);
      });

      // Keyboard shortcuts
      document.addEventListener("keydown", e => {
        if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
          e.preventDefault();
          els.search.focus();
        }
        if (e.key === "Escape") {
          if (els.search.value) {
            els.search.value = "";
            currentFilter.query = "";
            render();
          }
          els.search.blur();
        }
      });

      window.addEventListener("resize", updateStickyOffset);
    }

    /* ── Helpers ── */
    function getShowKey(s) {
      return s.feed_url || s.slug || s.name;
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    /* ── Filtering ── */
    function getFilteredShows() {
      let shows = allShows;

      if (currentFilter.query) {
        const q = currentFilter.query;
        shows = shows.filter(s =>
          (s.name || "").toLowerCase().includes(q)
        );
      }

      return shows;
    }

    /* ── Sorting ── */
    function sortShows(shows) {
      const { field, direction } = currentSort;
      const mult = direction === "asc" ? 1 : -1;
      return [...shows].sort((a, b) => {
        let va, vb;
        if (field === "name") {
          va = (a.name || "").toLowerCase();
          vb = (b.name || "").toLowerCase();
        } else if (field === "status") {
          const order = { "Running": 0, "To Be Determined": 1, "In Development": 2, "Ended": 3 };
          va = order[a.status] ?? 4;
          vb = order[b.status] ?? 4;
        }
        if (va < vb) return -1 * mult;
        if (va > vb) return  1 * mult;
        return 0;
      });
    }

    function updateSortIndicators() {
      document.querySelectorAll(".sortable").forEach(th => {
        th.classList.remove("sort-asc", "sort-desc");
        if (th.dataset.sort === currentSort.field) {
          th.classList.add(currentSort.direction === "asc" ? "sort-asc" : "sort-desc");
        }
      });
    }

    /* ── Render ── */
    function render() {
      const filtered = getFilteredShows();
      const sorted = sortShows(filtered);

      els.stats.textContent = filtered.length + " of " + allShows.length + " shows";

      if (sorted.length === 0) {
        els.showsTable.hidden = true;
        els.emptyMsg.hidden = false;
        els.emptyMsg.textContent = currentFilter.query
          ? 'No shows found matching "' + currentFilter.query + '".'
          : "No shows match the current filters.";
        return;
      }

      els.showsTable.hidden = false;
      els.emptyMsg.hidden = true;

      const frag = document.createDocumentFragment();
      sorted.forEach(show => frag.appendChild(createRow(show)));
      els.showsBody.innerHTML = "";
      els.showsBody.appendChild(frag);

      updateSelectAllCb();
    }

    function createRow(show) {
      const tr = document.createElement("tr");
      tr.className = "show-row";
      const key = getShowKey(show);
      const isSelected = selectedShows.has(key);
      const year = show.premiered ? show.premiered.substring(0, 4) : "";

      let statusClass = "status-tbd";
      let statusLabel = show.status || "Unknown";
      if (statusLabel === "Running") statusClass = "status-running";
      else if (statusLabel === "Ended") statusClass = "status-ended";
      const statusDisplay = statusLabel === "To Be Determined" ? "TBD" : statusLabel;

      tr.innerHTML =
        '<td class="col-select"><input type="checkbox" class="show-cb" value="' + escapeHtml(key) + '"' + (isSelected ? " checked" : "") + '></td>' +
        '<td class="col-image"><img src="' + (show.image || "") + '" alt="" class="show-thumb" loading="lazy" width="40" height="56"></td>' +
        '<td class="col-name">' +
          '<div class="show-name-text">' + escapeHtml(show.name) + '</div>' +
          '<div class="show-year">' + year + '</div>' +
          '<div class="show-mobile-meta">' +
            '<span class="status-badge ' + statusClass + '">' + statusDisplay + '</span>' +
          '</div>' +
        '</td>' +
        '<td class="col-status"><span class="status-badge ' + statusClass + '">' + statusDisplay + '</span></td>' +
        '<td class="col-actions">' +
          '<button class="btn-action btn-rss" data-url="' + (show.feed_url || "") + '" title="Copy RSS URL">RSS</button>' +
          '<a href="' + (show.tvmaze_url || "#") + '" target="_blank" class="btn-action btn-link" title="View on TVmaze">&#8599;</a>' +
        '</td>';
      return tr;
    }

    /* ── Checkbox helpers ── */
    function updateSelectAllCb() {
      const filtered = getFilteredShows();
      if (filtered.length === 0) {
        els.selectAllCb.checked = false;
        els.selectAllCb.indeterminate = false;
        return;
      }
      const allSelected = filtered.every(s => selectedShows.has(getShowKey(s)));
      const someSelected = filtered.some(s => selectedShows.has(getShowKey(s)));
      els.selectAllCb.checked = allSelected;
      els.selectAllCb.indeterminate = !allSelected && someSelected;
    }

    function updateCheckboxes() {
      els.showsBody.querySelectorAll(".show-cb").forEach(cb => {
        cb.checked = selectedShows.has(cb.value);
      });
    }

    /* ── Bulk UI ── */
    function updateBulkUI() {
      const n = selectedShows.size;
      els.btnExport.textContent = n > 0 ? "Export OPML (" + n + ")" : "Export OPML";
      els.btnExport.disabled = n === 0;
      els.btnClear.disabled = n === 0;
    }

    /* ── Copy RSS ── */
    function copyRSS(btn) {
      const url = btn.dataset.url;
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "RSS"; btn.classList.remove("copied"); }, 2000);
      }).catch(() => {
        window.open(url, "_blank");
      });
    }

    /* ── OPML Export ── */
    function exportOPML() {
      if (selectedShows.size === 0) return;
      const toExport = allShows.filter(s => selectedShows.has(getShowKey(s)));
      const createdAt = new Date().toUTCString();
      let opml = '<?xml version="1.0" encoding="UTF-8"?>\n<opml version="2.0">\n  <head>\n    <title>TV Season Tracker RSS</title>\n    <dateCreated>' + createdAt + '</dateCreated>\n  </head>\n  <body>\n';
      toExport.forEach(show => {
        const title = (show.name || "Untitled").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
        const url = (show.feed_url || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;");
        opml += '    <outline text="' + title + '" title="' + title + '" type="rss" xmlUrl="' + url + '"/>\n';
      });
      opml += "  </body>\n</opml>";
      const blob = new Blob([opml], { type: "text/x-opml;charset=utf-8" });
      const u = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = u;
      a.download = "tv-shows-feeds.opml";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(u);
    }

    /* ── Sticky offset for thead ── */
    function updateStickyOffset() {
      const h = document.querySelector(".site-header").offsetHeight;
      document.querySelectorAll(".shows-table thead th").forEach(th => {
        th.style.top = h + "px";
      });
    }

    /* ── Boot ── */
    updateSortIndicators();
    updateBulkUI();
    init();
  </script>
</body>
</html>
